name: Python CI

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - name: Converting dataset to RDF 🔧
      run: |
         sudo apt-get install python3 python3-setuptools python3-pip python3-dev doxygen -y
         sudo pip3 install rdflib geopandas fastkml pygml lxml shapely pyshp geodatasets geojson_rewind bibtexparser
         cd docs
         doxygen Doxyfile
         cd ..
         cp -R docs/html/ result/
         python3 src/geordfconverter/rdfconverter.py --input Limes_Coordinates_Kleinkastell.geojson --output result/ --mapping mapping/sampleempty.json
         python3 src/geordfconverter/rdfconverter.py --input Limes_Coordinates_Kleinkastell.geojson --output result/ --mapping mapping/limes.json --literalformats wkt geojson gml kml wkb
         cp mapping/limes.json result/
         cp mapping/sampleempty.json result/
    - name: Deploy 🚀
      uses: JamesIves/github-pages-deploy-action@releases/v3
      with:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
         BRANCH: gh-pages
         FOLDER: result/
